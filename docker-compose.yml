services:
  ndr-flow-console:
    build: .
    ports:
      - "4173:4173"
    env_file:
      - .env
    environment:
      NDR_DATA_DIR: /data
    volumes:
      - ndr-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ndr-data:
